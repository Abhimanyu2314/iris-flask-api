<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Intelligence Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --panel-bg: rgba(30, 41, 59, 0.7);
            --panel-border: rgba(255, 255, 255, 0.08);
            --accent-primary: #6366f1;
            --accent-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 28px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--panel-border);
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent-primary);
            border: none;
            color: white;
            font-size: 15px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        #result-panel {
            margin-top: 24px;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            font-weight: 500;
            font-size: 15px;
            display: none;
            border: 1px solid transparent;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-loading {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border-color: var(--panel-border);
        }

        .species-result {
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            border-color: rgba(99, 102, 241, 0.3);
            font-size: 18px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Iris Classifier</h1>
        <p>Predictive Machine Learning Service</p>
    </div>
    
    <form id="predictorForm">
        <div class="grid-inputs">
            <div class="input-group">
                <label>Sepal Length</label>
                <input type="number" id="sepal_length" step="0.1" required value="5.1">
            </div>
            <div class="input-group">
                <label>Sepal Width</label>
                <input type="number" id="sepal_width" step="0.1" required value="3.5">
            </div>
            <div class="input-group">
                <label>Petal Length</label>
                <input type="number" id="petal_length" step="0.1" required value="1.4">
            </div>
            <div class="input-group">
                <label>Petal Width</label>
                <input type="number" id="petal_width" step="0.1" required value="0.2">
            </div>
        </div>
        <button type="submit">Run Prediction</button>
    </form>
    
    <div id="result-panel"></div>
</div>

<script>
    const targetMap = { 0: 'Setosa 🌸', 1: 'Versicolor 🌻', 2: 'Virginica 🌺' };
    
    document.getElementById('predictorForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const panel = document.getElementById('result-panel');
        
        const features = [
            parseFloat(document.getElementById('sepal_length').value),
            parseFloat(document.getElementById('sepal_width').value),
            parseFloat(document.getElementById('petal_length').value),
            parseFloat(document.getElementById('petal_width').value)
        ];

        panel.style.display = 'block';
        panel.className = 'status-loading';
        panel.innerText = 'Processing analytical data...';

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ features })
            });
            const data = await response.json();
            const speciesName = targetMap[data.prediction[0]] || 'Unknown Classification';
            
            panel.className = 'species-result';
            panel.innerText = `Classification: ${speciesName}`;
        } catch (error) {
            panel.style.background = 'rgba(239, 68, 68, 0.1)';
            panel.style.color = '#fca5a5';
            panel.style.borderColor = 'rgba(239, 68, 68, 0.3)';
            panel.innerText = 'Network error executing pipeline.';
        }
    });
</script>
</body>
</html>
