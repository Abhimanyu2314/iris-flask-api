<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Flower Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1e252b;
            --panel-bg: #252d35;
            --copper-border: #8c6a53;
            --text-gold: #dfc2a5;
            --text-muted: #8e9ca8;
            --input-bg: #1c2227;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background-color: var(--panel-bg);
            border: 1px solid var(--copper-border);
            border-radius: 16px;
            padding: 35px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            margin: 0 0 30px 0;
            color: var(--text-gold);
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }

        input {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid rgba(140, 106, 83, 0.4);
            border-radius: 8px;
            padding: 12px 14px;
            color: var(--text-gold);
            font-size: 15px;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--copper-border);
        }

        button {
            width: 100%;
            background: linear-gradient(180deg, #0a4d34 0%, #063322 100%);
            border: 1px solid #116847;
            color: #a3e2c9;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 4px 10px rgba(0,0,0,0.3);
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .result-container {
            position: relative;
            margin-top: 25px;
            display: none;
        }

        #result-panel {
            background-color: rgba(28, 34, 39, 0.8);
            border-radius: 8px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-gold);
            text-align: center;
            border: 1px solid rgba(140, 106, 83, 0.2);
            padding-right: 60px; /* Make space for the thumbnail overlap */
        }

        .flower-avatar {
            position: absolute;
            right: -10px;
            top: 50%;
            transform: translateY(-50%);
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 2px solid var(--copper-border);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            background-size: cover;
            background-position: center;
            display: none;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Iris Flower Predictor</h2>
    <form id="predictorForm">
        <div class="input-group">
            <label>Sepal Length (cm)</label>
            <input type="number" id="sepal_length" step="0.1" required value="5.1">
        </div>
        <div class="input-group">
            <label>Sepal Width (cm)</label>
            <input type="number" id="sepal_width" step="0.1" required value="3.5">
        </div>
        <div class="input-group">
            <label>Petal Length (cm)</label>
            <input type="number" id="petal_length" step="0.1" required value="1.4">
        </div>
        <div class="input-group">
            <label>Petal Width (cm)</label>
            <input type="number" id="petal_width" step="0.1" required value="0.2">
        </div>
        <button type="submit">Predict Species</button>
    </form>
    
    <div class="result-container" id="resContainer">
        <div id="result-panel"></div>
        <div class="flower-avatar" id="flowerImg"></div>
    </div>
</div>

<script>
    const targetMap = { 
        0: { name: 'Setosa 🌸', img: 'https://upload.wikimedia.org/wikipedia/commons/5/56/Kosaciec_szczecinkowaty_Iris_setosa.jpg' }, 
        1: { name: 'Versicolor 🌻', img: 'https://upload.wikimedia.org/wikipedia/commons/4/41/Iris_versicolor_3.jpg' }, 
        2: { name: 'Virginica 🌺', img: 'https://upload.wikimedia.org/wikipedia/commons/9/9f/Iris_virginica.jpg' } 
    };
    
    document.getElementById('predictorForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const container = document.getElementById('resContainer');
        const panel = document.getElementById('result-panel');
        const avatar = document.getElementById('flowerImg');
        
        const features = [
            parseFloat(document.getElementById('sepal_length').value),
            parseFloat(document.getElementById('sepal_width').value),
            parseFloat(document.getElementById('petal_length').value),
            parseFloat(document.getElementById('petal_width').value)
        ];

        container.style.display = 'block';
        avatar.style.display = 'none';
        panel.innerText = 'Analyzing data attributes...';

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ features })
            });
            const data = await response.json();
            const predictionId = data.prediction[0];
            const species = targetMap[predictionId];
            
            if(species) {
                panel.innerText = `Predicted Species: ${species.name}`;
                avatar.style.backgroundImage = `url('${species.img}')`;
                avatar.style.display = 'block';
            } else {
                panel.innerText = 'Unknown Classification';
            }
        } catch (error) {
            panel.innerText = 'Error executing pipeline request.';
        }
    });
</script>
</body>
</html>
