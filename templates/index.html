<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Species Predictor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #333; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-weight: 600; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #2ecc71; border: none; color: white; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #27ae60; }
        #result { margin-top: 20px; padding: 15px; border-radius: 6px; text-align: center; font-weight: bold; display: none; }
        .setosa { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>

<div class="card">
    <h2>Iris Flower Predictor</h2>
    <form id="predictorForm">
        <div class="input-group"><label>Sepal Length (cm)</label><input type="number" id="sepal_length" step="0.1" required value="5.1"></div>
        <div class="input-group"><label>Sepal Width (cm)</label><input type="number" id="sepal_width" step="0.1" required value="3.5"></div>
        <div class="input-group"><label>Petal Length (cm)</label><input type="number" id="petal_length" step="0.1" required value="1.4"></div>
        <div class="input-group"><label>Petal Width (cm)</label><input type="number" id="petal_width" step="0.1" required value="0.2"></div>
        <button type="submit">Predict Species</button>
    </form>
    <div id="result"></div>
</div>

<script>
    const targetMap = { 0: 'Setosa 🌸', 1: 'Versicolor 🌻', 2: 'Virginica 🌺' };
    
    document.getElementById('predictorForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const resultDiv = document.getElementById('result');
        
        const features = [
            parseFloat(document.getElementById('sepal_length').value),
            parseFloat(document.getElementById('sepal_width').value),
            parseFloat(document.getElementById('petal_length').value),
            parseFloat(document.getElementById('petal_width').value)
        ];

        resultDiv.style.display = 'block';
        resultDiv.className = 'setosa';
        resultDiv.innerText = 'Calculating...';

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ features })
            });
            const data = await response.json();
            const speciesName = targetMap[data.prediction[0]] || 'Unknown';
            resultDiv.innerText = `Predicted Species: ${speciesName}`;
        } catch (error) {
            resultDiv.innerText = 'Error making prediction.';
        }
    });
</script>
</body>
</html>
